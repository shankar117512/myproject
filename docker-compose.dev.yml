version: '3.9'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data/
    environment:
      - DATABASE_HOST=db
      POSTGRES_DB: myproject_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  web:
    build:
      context: .
      target: builder
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/myproject_dev
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      - db

volumes:
  postgres_dev_data:
