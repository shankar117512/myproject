name: Dev CI/CD Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  PYTHON_VERSION: '3.11'
  DJANGO_SETTINGS_MODULE: config.settings.dev

jobs:
  # ─── Lint & Code Quality ─────────────────────────────────────────────────
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Lint Dependencies
        run: |
          pip install black flake8 isort
      
      - name: Run Black Formatter Check
        run: black .
      
      - name: Run Flake8 Linter
        run: flake8 . --max-line-length=120 --exclude=venv,migrations
      
      - name: Run isort Import Check
        run: isort --check-only .

  # ─── Test Suite ──────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements/dev.txt

      - name: Run Migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key
        run: python manage.py migrate --settings=config.settings.dev

      - name: Run Test Suite with Coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key
        run: |
          coverage run -m pytest --tb=short -v
          coverage report --fail-under=70
          coverage xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-dev
          path: coverage.xml

  # ─── Docker Build Verification ───────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t myproject:dev-${{ github.sha }} .

  # ─── Deploy to Dev Environment ───────────────────────────────────────────
  deploy-dev:
    name: Deploy to Railway Dev
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Dev
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway environment dev
          railway up --detach

      - name: Verify Deployment Health
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          railway status --service ${{ secrets.RAILWAY_SERVICE_ID_DEV }}

      - name: Notify Success
        run: echo "✅ Dev deployment successful — Commit ${{ github.sha }}"
