version: '3.9'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: myproject_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_staging
    ports:
      - "5434:5432"

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env.staging
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_staging@db:5432/myproject_staging
      - DJANGO_SETTINGS_MODULE=config.settings.staging
    depends_on:
      - db

volumes:
  postgres_staging_data:
