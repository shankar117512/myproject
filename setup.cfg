[coverage:run]
source = .
omit =
    */migrations/*
    */venv/*
    manage.py
    config/settings/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    raise NotImplementedError
    pass

[flake8]
max-line-length = 120
exclude = venv, migrations
per-file-ignores =
    config/settings/*.py: F401, F403, F405

[isort]
profile = black
skip = migrations,venv
